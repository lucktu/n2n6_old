name: Build N2N_IPV6

on:
#  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: ${{ matrix.TARGET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows_static
            os: windows-latest
            ARCH: x64
            MSVC_ARCH: x64
            artifact_name: windows_x64_static
          - target: x86_64-pc-windows
            os: windows-latest
            ARCH: x64
            MSVC_ARCH: x64
            artifact_name: windows_x64

          - target: i686-pc-windows_static
            os: windows-latest
            ARCH: x86
            MSVC_ARCH: x86
            artifact_name: windows_x86_static
          - target: i686-pc-windows
            os: windows-latest
            ARCH: x86
            MSVC_ARCH: x86
            artifact_name: windows_x86

          - target: aarch64-linux-musl_static
            os: ubuntu-latest
            URL: aarch64-linux-musl
            artifact_name: linux_aarch64_musl_static
          - target: aarch64-linux-musl
            os: ubuntu-latest
            URL: aarch64-linux-musl
            artifact_name: linux_aarch64_musl

          - target: x86_64-linux-musl_static
            os: ubuntu-latest
            URL: x86_64-linux-musl
            artifact_name: linux_x64_musl_static
          - target: x86_64-linux-musl
            os: ubuntu-latest
            URL: x86_64-linux-musl
            artifact_name: linux_x64_musl

          - target: i686-linux-musl_static
            os: ubuntu-latest
            URL: i686-linux-musl
            artifact_name: linux_x86_musl_static
          - target: i686-linux-musl
            os: ubuntu-latest
            URL: i686-linux-musl
            artifact_name: linux_x86_musl

          - target: armv7-linux-musleabihf_static
            os: ubuntu-latest
            URL: armv7l-linux-musleabihf
            artifact_name: linux_armv7_musleabihf_static
          - target: armv7-linux-musleabihf
            os: ubuntu-latest
            URL: armv7l-linux-musleabihf
            artifact_name: linux_armv7_musleabihf

          - target: armv7-linux-musleabi_static
            os: ubuntu-latest
            URL: armv7m-linux-musleabi
            artifact_name: linux_armv7_musleabi_static
          - target: armv7-linux-musleabi
            os: ubuntu-latest
            URL: armv7m-linux-musleabi
            artifact_name: linux_armv7_musleabi

          - target: arm-linux-musleabihf_static
            os: ubuntu-latest
            URL: arm-linux-musleabihf
            artifact_name: linux_arm_musleabihf_static
          - target: arm-linux-musleabihf
            os: ubuntu-latest
            URL: arm-linux-musleabihf
            artifact_name: linux_arm_musleabihf

          - target: arm-linux-musleabi_static
            os: ubuntu-latest
            URL: arm-linux-musleabi
            artifact_name: linux_arm_musleabi_static
          - target: arm-linux-musleabi
            os: ubuntu-latest
            URL: arm-linux-musleabi
            artifact_name: linux_arm_musleabi

          - target: mipsel-linux-musl_static
            os: ubuntu-latest
            URL: mipsel-linux-muslsf
            artifact_name: linux_mipsel_musl_static
          - target: mipsel-linux-musl
            os: ubuntu-latest
            URL: mipsel-linux-muslsf
            artifact_name: linux_mipsel_musl

          - target: mips-linux-musl_static
            os: ubuntu-latest
            URL: mips-linux-muslsf
            artifact_name: linux_mips_musl_static
          - target: mips-linux-musl
            os: ubuntu-latest
            URL: mips-linux-muslsf
            artifact_name: linux_mips_musl

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: mac_x64_darwin

    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.TARGET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup MSVC environment
        if: runner.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.MSVC_ARCH }}

      - name: Windows build (static)
        if: runner.os == 'windows' && endsWith(matrix.TARGET, '_static')
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS_RELEASE="/MT /O2 /DWIN32 /D_WIN32_WINNT=0x0601" `
            -DCMAKE_EXE_LINKER_FLAGS="/SUBSYSTEM:CONSOLE,6.01 /MACHINE:${{ matrix.ARCH }}" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded"
          nmake
          .\edge.exe -h || true
          .\supernode.exe -h || true

      - name: Windows build (dynamic)
        if: runner.os == 'windows' && !endsWith(matrix.TARGET, '_static')
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS_RELEASE="/MD /O2 /DWIN32 /D_WIN32_WINNT=0x0601" `
            -DCMAKE_EXE_LINKER_FLAGS="/SUBSYSTEM:CONSOLE,6.01 /MACHINE:${{ matrix.ARCH }}" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreadedDLL"
          nmake
          .\edge.exe -h || true
          .\supernode.exe -h || true

      - name: Set timezone
        if: runner.os == 'Linux'
        run: sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Download gcc
        if: runner.os == 'Linux'
        uses: lmq8267/dl-musl@main
        with:
          target: ${{ matrix.URL }}
          static: true
          gccpath: /opt/musl_gcc

      - name: Linux build
        if: runner.os == 'Linux'
        run: |
          LINKDIR="build"
          rm -rf "$LINKDIR"
          mkdir -p "$LINKDIR" && cd "$LINKDIR"
          EXTRA=""
          [ "${{ endsWith(matrix.TARGET, '_static') }}" = "true" ] && EXTRA="-static -static-libgcc"
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -ffunction-sections -fdata-sections -fno-strict-aliasing" \
            -DCMAKE_EXE_LINKER_FLAGS="$EXTRA -Wl,--gc-sections" \
            -DCMAKE_C_COMPILER=${CC}
          make -j$(nproc)
          ./edge -h || true
          ls -la
          file edge
          $STRIP edge
          $STRIP supernode

      - name: macOS build
        if: runner.os == 'macOS'
        run: |
          rm -rf build
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -ffunction-sections -fdata-sections" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-dead_strip"
          make -j$(sysctl -n hw.logicalcpu)
          ./edge -h || true
          ls -la
          file edge
          strip edge
          strip supernode

      - name: Upload
        uses: actions/upload-artifact@master
        if: always()
        continue-on-error: true
        with:
          name: n2n_v2.3_${{ matrix.artifact_name }}
          path: |
            build/edge${{ runner.os == 'Windows' && '.exe' || '' }}
            build/supernode${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Delete workflow
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 1